steps:
  # 0. Pull the latest image to use as a cache (ignore failure if it's the first run)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio-repo/intelligent-portfolio-backend:latest || exit 0']

  # 1. Build the container image for the backend using the cache
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio-repo/intelligent-portfolio-backend:$COMMIT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio-repo/intelligent-portfolio-backend:latest'
      - '--cache-from'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio-repo/intelligent-portfolio-backend:latest'
      - './be'
    
  # 2. Push BOTH the specific commit image AND the latest tag to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio-repo/intelligent-portfolio-backend'
      - '--all-tags'
    
  # 3. Deploy container image to Cloud Run (HARD CAPPED FOR FREE TIER)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'intelligent-portfolio-backend'
      - '--image'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio-repo/intelligent-portfolio-backend:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '1'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,QDRANT_API_KEY=QDRANT_API_KEY:latest,ADMIN_PASSPHRASE=ADMIN_PASSPHRASE:latest,JWT_SECRET=JWT_SECRET:latest'
      - '--set-env-vars=^@^QDRANT_URL=https://de007058-12ec-4d2a-875a-c6c120dbcd95.eu-west-2-0.aws.cloud.qdrant.io:6333^@^USE_FIRESTORE=False^@^FIRESTORE_PROJECT_ID=gen-lang-client-0511428447^@^CORS_ORIGINS=http://localhost:3000,https://intelligent-portfolio-voyp.onrender.com'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio-repo/intelligent-portfolio-backend:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/portfolio-repo/intelligent-portfolio-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
